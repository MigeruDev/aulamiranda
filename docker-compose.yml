services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - mi-red

  api:
    image: nginx:alpine
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - mi-red

networks:
  mi-red:
    driver: bridge
